<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
</head>

<body>
{% extends "base.html" %}

{% block title %}Orders{% endblock %}

{% block content %}

<div class="card">

    <h1>📦 My Orders</h1>

</div>

{% for o in orders %}

<div class="card">

    <h3>
        Order #{{ o["id"] }}
    </h3>

    <p>
        Total:
        ৳ {{ o["total"] }}
    </p>

    <p>
        Status:
        {{ o["status"] }}
    </p>

</div>

{% endfor %}

{% endblock %}

</body>
</html>
