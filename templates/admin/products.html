{% extends "base.html" %}

{% block title %}
Approve Products
{% endblock %}

{% block content %}

<h2>📦 Product Approval</h2>

{% for p in products %}

<div class="card">

<h3>{{ p["name"] }}</h3>

<p>
Farmer Price:
৳ {{ p["price"] }}
</p>

{% if p["approved"] == 0 %}

<a href="/approve/{{ p['id'] }}">
<button>
Approve
</button>
</a>

{% else %}

<p>✅ Approved</p>

{% endif %}

</div>

{% endfor %}

{% endblock %}
