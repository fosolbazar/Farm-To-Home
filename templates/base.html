<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
{% block title %}
Farm To Home
{% endblock %}
</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

nav{
background:#2e7d32;
padding:15px;
display:flex;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.container{
width:90%;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

button{
padding:10px 15px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

img{
max-width:100%;
border-radius:10px;
}
</style>

</head>
<body>

<nav>

<a href="/">Home</a>

<a href="/marketplace">Marketplace</a>

<a href="/cart">Cart</a>

{% if session.get("role")=="farmer" %}
<a href="/farmer">Farmer</a>
{% endif %}

{% if session.get("role")=="admin" %}
<a href="/admin">Admin</a>
{% endif %}

{% if session.get("user_id") %}
<a href="/logout">Logout</a>
{% else %}
<a href="/login">Login</a>
<a href="/signup">Signup</a>
{% endif %}

</nav>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
