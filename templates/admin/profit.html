{% extends "base.html" %}
{% block title %}Profit Dashboard{% endblock %}

{% block content %}
<h2 class="mb-4">💰 Profit Dashboard</h2>

<div class="row">
  <!-- Total Revenue -->
  <div class="col-md-4">
    <div class="card text-center p-3 mb-3 shadow-sm">
      <h4>Total Revenue</h4>
      <h2 class="text-primary">৳ {{ revenue|int }}</h2>
    </div>
  </div>

  <!-- Farmer Share -->
  <div class="col-md-4">
    <div class="card text-center p-3 mb-3 shadow-sm">
      <h4>Farmer Share</h4>
      <h2 class="text-success">৳ {{ farmer|int }}</h2>
    </div>
  </div>

  <!-- Platform Profit -->
  <div class="col-md-4">
    <div class="card text-center p-3 mb-3 shadow-sm">
      <h4>Platform Profit</h4>
      <h2 class="text-danger">৳ {{ profit|int }}</h2>
    </div>
  </div>
</div>
{% endblock %}
