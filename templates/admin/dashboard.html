{% extends "base.html" %}
{% block title %}Admin Dashboard{% endblock %}
{% block content %}
<h2>👨‍💼 Admin Dashboard</h2>
<div class="row">
  <div class="col-md-6">
    <div class="card p-3 shadow-sm">
      <h4>Total Users</h4>
      <h2>{{ users }}</h2>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card p-3 shadow-sm">
      <h4>Total Products</h4>
      <h2>{{ products }}</h2>
    </div>
  </div>
</div>
<a href="/admin/products" class="btn btn-primary mt-3">Manage Products</a>
<a href="/admin/profit" class="btn btn-success mt-3">View Profit</a>
{% endblock %}
