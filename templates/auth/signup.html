{% extends "base.html" %}

{% block title %}
Signup
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm">
            <h2 class="text-center mb-4">📝 Signup</h2>
            <form method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                </div>

                <div class="mb-3">
                    <label for="mobile" class="form-label">Mobile</label>
                    <input type="text" class="form-control" id="mobile" name="mobile" placeholder="Enter mobile number" required>
                </div>

                <div class="mb-3">
                    <label for="upazila" class="form-label">Upazila</label>
                    <input type="text" class="form-control" id="upazila" name="upazila" placeholder="Enter upazila" required>
                </div>

                <div class="mb-3">
                    <label for="district" class="form-label">District</label>
                    <input type="text" class="form-control" id="district" name="district" placeholder="Enter district" required>
                </div>

                <div class="mb-3">
                    <label for="role" class="form-label">Role</label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="buyer">Buyer</option>
                        <option value="farmer">Farmer</option>
                        <option value="courier">Courier</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success w-100">Signup</button>
            </form>
            <p class="mt-3 text-center">
                Already have an account? <a href="/login">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
